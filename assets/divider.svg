<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="6" viewBox="0 0 1200 6" preserveAspectRatio="none">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1200 0; 1200 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="2" y="2" fill="url(#base)"/>
  <rect width="1200" height="6" fill="url(#shimmer)"/>
</svg>
