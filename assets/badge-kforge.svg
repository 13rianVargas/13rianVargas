<svg xmlns="http://www.w3.org/2000/svg" width="260" height="44" viewBox="0 0 260 44">
  <defs>
    <linearGradient id="kforgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <filter id="boltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="260" height="44" rx="10" fill="url(#kforgeBg)" stroke="#FFD700" stroke-width="1.5"/>

  <g transform="translate(24, 22)" fill="#FFD700" filter="url(#boltGlow)">
    <path d="M -2 -11 L -8 2 L -1 2 L -4 11 L 8 -3 L 1 -3 L 4 -11 Z">
      <animate attributeName="opacity" values="1;0.45;1" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <line x1="52" y1="10" x2="52" y2="34" stroke="#FFD700" stroke-opacity="0.35" stroke-width="1"/>

  <text x="64" y="21" font-family="'Fira Code', 'Courier New', monospace" font-size="13" font-weight="700" fill="#FFD700" letter-spacing="1.5">K-FORGE</text>
  <text x="64" y="35" font-family="'Fira Code', 'Courier New', monospace" font-size="13" font-weight="500" fill="#FFF8DC" letter-spacing="0.3">Founder</text>
</svg>
