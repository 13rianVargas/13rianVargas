<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1A1308" stop-opacity="1"/>
      <stop offset="45%" stop-color="#0D1117" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.09"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <linearGradient id="shimmerOverlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1200 0; 1200 0; -1200 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="hexMesh" x="0" y="0" width="64" height="56" patternUnits="userSpaceOnUse">
      <polygon points="32,2 60,17 60,49 32,64 4,49 4,17" fill="none" stroke="#FFD700" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#bgRadial)"/>
  <rect width="1200" height="400" fill="url(#centerGlow)"/>
  <rect width="1200" height="400" fill="url(#hexMesh)" opacity="0.85"/>

  <g stroke="#FFD700" fill="none">
    <circle cx="600" cy="200" r="90" stroke-width="1.2" stroke-opacity="0.22">
      <animate attributeName="r" values="90;220" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.22;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="200" r="90" stroke-width="1.2" stroke-opacity="0.22">
      <animate attributeName="r" values="90;220" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.22;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="200" r="90" stroke-width="1.2" stroke-opacity="0.22">
      <animate attributeName="r" values="90;220" dur="4.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.22;0" dur="4.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#FFD700">
    <circle cx="180" cy="340" r="1.6" opacity="0">
      <animate attributeName="cy" values="340;90" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="360" r="2" opacity="0">
      <animate attributeName="cy" values="360;70" dur="9.5s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="9.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="320" cy="370" r="1.3" opacity="0">
      <animate attributeName="cy" values="370;110" dur="7.5s" repeatCount="indefinite" begin="2.4s"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="7.5s" repeatCount="indefinite" begin="2.4s"/>
    </circle>
    <circle cx="105" cy="380" r="1.8" opacity="0">
      <animate attributeName="cy" values="380;60" dur="11s" repeatCount="indefinite" begin="3.5s"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="11s" repeatCount="indefinite" begin="3.5s"/>
    </circle>
    <circle cx="900" cy="350" r="1.5" opacity="0">
      <animate attributeName="cy" values="350;90" dur="8.5s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="8.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="970" cy="365" r="1.2" opacity="0">
      <animate attributeName="cy" values="365;100" dur="10s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="1050" cy="380" r="2.2" opacity="0">
      <animate attributeName="cy" values="380;80" dur="11.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="11.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="1110" cy="355" r="1.4" opacity="0">
      <animate attributeName="cy" values="355;110" dur="9s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="9s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>

  <g opacity="0.22">
    <g transform="translate(150, 200)">
      <polygon points="0,-30 26,0 0,30 -26,0" fill="none" stroke="#FFD700" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="0,-18 16,0 0,18 -16,0" fill="#FFD700">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="35s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <g transform="translate(1050, 200)">
      <polygon points="0,-30 26,0 0,30 -26,0" fill="none" stroke="#FFD700" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="50s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="0,-18 16,0 0,18 -16,0" fill="#FFD700">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="35s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <text x="600" y="215" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="96" font-weight="900" fill="url(#goldText)" text-anchor="middle" filter="url(#textGlow)" letter-spacing="-3">
    13rian Vargas
  </text>
  <text x="600" y="215" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="96" font-weight="900" fill="url(#shimmerOverlay)" text-anchor="middle" letter-spacing="-3">
    13rian Vargas
  </text>

  <text x="600" y="270" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="14" font-weight="700" fill="#FFD700" text-anchor="middle" letter-spacing="7" opacity="0.92">
    FULL STACK DEVELOPER  ◈  K-FORGE FOUNDER
  </text>

  <g transform="translate(600, 320)">
    <line x1="-180" y1="0" x2="-22" y2="0" stroke="#FFD700" stroke-width="1" opacity="0.35"/>
    <polygon points="0,-7 7,0 0,7 -7,0" fill="#FFD700" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.95;0.4" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <line x1="22" y1="0" x2="180" y2="0" stroke="#FFD700" stroke-width="1" opacity="0.35"/>
  </g>

  <text x="600" y="358" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" fill="#FFF8DC" text-anchor="middle" letter-spacing="2" opacity="0.6">
    Forging software at Fundación Universitaria Konrad Lorenz
  </text>
</svg>
